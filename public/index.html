<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Your Word</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .emoji { font-size: 48px; margin-bottom: 16px; }

    .prompt {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 16px 20px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
    input[type="text"]:focus { border-color: #7c6ff7; }

    button {
      padding: 16px 28px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #7c6ff7, #a855f7);
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .feedback {
      font-size: 15px;
      min-height: 24px;
      margin-top: 8px;
      transition: opacity 0.3s;
    }

    .feedback.success { color: #4ade80; }
    .feedback.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">💬</div>
    <div class="prompt" id="prompt">Loading…</div>
    <div class="subtitle">Your answer will appear on the big screen!</div>

    <form id="form" autocomplete="off">
      <div class="input-group">
        <input type="text" id="word" placeholder="Type your word…" maxlength="40" autofocus />
        <button type="submit" id="btn">Send</button>
      </div>
    </form>
    <div class="feedback" id="feedback"></div>
  </div>

  <script>
    const form = document.getElementById("form");
    const input = document.getElementById("word");
    const btn = document.getElementById("btn");
    const fb = document.getElementById("feedback");

    // Load prompt
    fetch("/api/prompt")
      .then((r) => r.json())
      .then((d) => (document.getElementById("prompt").textContent = d.prompt));

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const word = input.value.trim();
      if (!word) return;

      btn.disabled = true;
      try {
        const res = await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ word }),
        });
        if (res.ok) {
          fb.textContent = "Submitted! ✓";
          fb.className = "feedback success";
          input.value = "";
        } else {
          throw new Error();
        }
      } catch {
        fb.textContent = "Something went wrong, try again";
        fb.className = "feedback error";
      }
      btn.disabled = false;
      input.focus();
      setTimeout(() => (fb.textContent = ""), 3000);
    });
  </script>
</body>
</html>
